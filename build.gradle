/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java'
    id 'maven-publish'
    id "org.sonarqube" version "4.0.0.2929"
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web:3.3.0'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.16.0'
    implementation 'org.springframework.kafka:spring-kafka:3.2.0'
    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    implementation 'org.springframework.boot:spring-boot-starter-data-mongodb-reactive:3.3.0'
    implementation group: 'org.dom4j', name: 'dom4j', version: '2.1.0'
    implementation 'org.projectlombok:lombok:1.18.32'

    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.3.0'
    annotationProcessor 'org.projectlombok:lombok:1.18.32'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.32'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'

}

group = 'com.example'
version = application_version
description = application_name

// Update source and target compatibility to Java 17
java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

sonar {
    properties {
        property "sonar.projectKey", "ai_springboot-demo_fc5e89ea-8436-48bf-b1c1-de51b1efd2e2"
        property "sonar.projectName", "springboot-demo"
        property "sonar.host.url", "http://host.docker.internal:9000"
    }
}

